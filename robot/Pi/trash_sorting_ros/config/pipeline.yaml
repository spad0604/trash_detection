sensor_bridge:
  ros__parameters:
    # ESP32 sensor board on USB path 1.3 -> ttyUSB1.
    port: /dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.3:1.0-port0
    baudrate: 115200
    read_timeout: 0.2
    reconnect_delay: 2.0
    poll_interval: 3.0
    # Most IR obstacle modules are active-low. Set to 1 if your module outputs
    # HIGH when an object is present.
    ir_detected_state: 0

actuator_bridge:
  ros__parameters:
    # ESP32 actuator board on USB path 1.4 -> ttyUSB0.
    port: /dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.4:1.0-port0
    baudrate: 115200
    read_timeout: 0.2
    reconnect_delay: 2.0

trash_orchestrator:
  ros__parameters:
    lid_open_seconds: 3.0
    capture_delay_seconds: 0.8
    sort_timeout_seconds: 12.0
    led_on_seconds: 3.0
    full_threshold_percent: 95
    # Circular-line navigation: CMD:MOVE_START goes to the dump marker,
    # CMD:MOVE_HOME continues forward to the next home marker.
    full_bin_move_command: CMD:MOVE_START
    # YOLO waste classes: BIODEGRADABLE, CARDBOARD, GLASS, METAL, PAPER, PLASTIC.
    # Robot bins: 0=Recycle, 1=Organic, 2=Other.
    class_to_bin: '{"biodegradable":1,"cardboard":0,"glass":2,"metal":0,"paper":0,"plastic":0,"other":2,"0":1,"1":0,"2":2,"3":0,"4":0,"5":0}'

yolo_classifier:
  ros__parameters:
    # Can also be supplied by TRASH_YOLO_MODEL.
    model_path: 'models/best_model.pt'
    camera_index: 0
    image_width: 640
    image_height: 480
    camera_warmup_frames: 20
    camera_warmup_delay_seconds: 0.05
    confidence_threshold: 0.25
    fallback_bin: 2
    debug_image_dir: '/home/giap/trash_ws/debug_images'
    # YOLO waste classes: BIODEGRADABLE, CARDBOARD, GLASS, METAL, PAPER, PLASTIC.
    # Robot bins: 0=Recycle, 1=Organic, 2=Other.
    trash_class_map: '{"biodegradable":1,"cardboard":0,"glass":2,"metal":0,"paper":0,"plastic":0,"other":2,"0":1,"1":0,"2":2,"3":0,"4":0,"5":0}'

firebase_bridge:
  ros__parameters:
    database_url: https://trash-detection-9d793-default-rtdb.firebaseio.com
    bin_id: bin_001
    # Can also be supplied by FIREBASE_AUTH_TOKEN.
    auth_token: ''
    full_threshold_percent: 95
    http_timeout_seconds: 3.0
    command_poll_interval_seconds: 1.0
